name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: MathiyazhaganNTL
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23ff0000&color_dots=%23ebedf0,%23ff9999,%23ff4d4d,%23b30000,%23660000
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23ff0000&color_dots=%230d1117,%234c0000,%238b0000,%23cc0000,%23ff0000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}