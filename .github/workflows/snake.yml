name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: MathiyazhaganNTL
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff0000&color_dots=#ebedf0,#ff9999,#ff4d4d,#b30000,#660000
            dist/github-contribution-grid-snake-dark.svg?color_snake=#ff0000&color_dots=#0d1117,#4c0000,#8b0000,#cc0000,#ff0000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}